services:
  postgres:
    image: postgres:15-alpine
    container_name: bank-api-django-db
    restart: always
    environment:
      POSTGRES_USER: ${PG_DB_USERNAME}
      POSTGRES_PASSWORD: ${PG_DB_PASSWORD}
      POSTGRES_DB: ${PG_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    shm_size: "2gb"
    command: >
      postgres
      -c max_connections=500
      -c shared_buffers=2GB
      -c effective_cache_size=6GB
      -c random_page_cost=1.1
      -c bgwriter_lru_maxpages=100
      -c deadlock_timeout=1s
      -c work_mem=32MB
      -c maintenance_work_mem=1GB
      -c wal_buffers=64MB
      -c checkpoint_timeout=15min
      -c max_wal_size=4GB
      -c checkpoint_completion_target=0.9
      -c log_min_duration_statement=250
      -c idle_in_transaction_session_timeout=10s
      -c statement_timeout=15000
      -c synchronous_commit=off
      -c max_parallel_workers_per_gather=4
      -c max_worker_processes=8
      -c max_parallel_workers=8
      -c autovacuum_vacuum_scale_factor=0.05
      -c autovacuum_analyze_scale_factor=0.02
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: "8g"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: bank-api-django-pgbouncer
    restart: always
    environment:
      DB_USER: ${PG_DB_USERNAME}
      DB_PASSWORD: ${PG_DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${PG_DB_NAME}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 5000
      DEFAULT_POOL_SIZE: 300
      AUTH_TYPE: plain
    ports:
      - "6432:5432"
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512m"

  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: bank-api-django-queue
    restart: always
    ports:
      - "6389:6379"
    command: valkey-server --maxmemory 512mb --maxmemory-policy noeviction --appendonly yes
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1g"

  app:
    build: .
    restart: always
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: "1g"
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      DATABASE_URL: postgresql://${PG_DB_USERNAME}:${PG_DB_PASSWORD}@pgbouncer:5432/${PG_DB_NAME}
      REDIS_URL: redis://valkey:6379/0
      CELERY_BROKER_URL: redis://valkey:6379/0
      CELERY_RESULT_BACKEND: redis://valkey:6379/0
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers ${GUNICORN_WORKERS:-4}
      --threads ${GUNICORN_THREADS:-2}
      --timeout 120
      --keep-alive 5
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      pgbouncer:
        condition: service_started
      valkey:
        condition: service_started

  migrate:
    build: .
    restart: "no"
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      DATABASE_URL: postgresql://${PG_DB_USERNAME}:${PG_DB_PASSWORD}@pgbouncer:5432/${PG_DB_NAME}
      REDIS_URL: redis://valkey:6379/0
      CELERY_BROKER_URL: redis://valkey:6379/0
      CELERY_RESULT_BACKEND: redis://valkey:6379/0
    command: python manage.py migrate
    depends_on:
      - postgres
      - pgbouncer
      - valkey

  worker:
    build: .
    restart: always
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      DATABASE_URL: postgresql://${PG_DB_USERNAME}:${PG_DB_PASSWORD}@pgbouncer:5432/${PG_DB_NAME}
      REDIS_URL: redis://valkey:6379/0
      CELERY_BROKER_URL: redis://valkey:6379/0
      CELERY_RESULT_BACKEND: redis://valkey:6379/0
    command: celery -A config worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      pgbouncer:
        condition: service_started
      valkey:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "${VPS_PORT:-3000}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  postgres_data: