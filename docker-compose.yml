services:
  postgres:
    image: postgres:15-alpine
    container_name: bank-api-db
    restart: always
    environment:
      POSTGRES_USER: ${PG_DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${PG_DB_PASSWORD:-password}
      POSTGRES_DB: ${PG_DB_NAME:-api_bank}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    shm_size: "2gb"
    command: >
      postgres
      -c max_connections=300
      -c shared_buffers=2GB
      -c effective_cache_size=5GB
      -c work_mem=32MB
      -c maintenance_work_mem=1GB
      -c wal_buffers=64MB
      -c checkpoint_timeout=15min
      -c max_wal_size=3GB
      -c checkpoint_completion_target=0.9
      -c log_min_duration_statement=250
      -c idle_in_transaction_session_timeout=10s
      -c statement_timeout=15000
      -c synchronous_commit=off
      -c max_parallel_workers_per_gather=4
      -c max_worker_processes=8
      -c max_parallel_workers=8
      -c autovacuum_vacuum_scale_factor=0.05
      -c autovacuum_analyze_scale_factor=0.02
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: "6g"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: bank-api-pgbouncer
    restart: always
    environment:
      DB_USER: ${PG_DB_USERNAME:-postgres}
      DB_PASSWORD: ${PG_DB_PASSWORD:-password}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${PG_DB_NAME:-api_bank}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 100
      AUTH_TYPE: plain
    ports:
      - "6432:5432"
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "512m"

  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: bank-api-queue
    restart: always
    ports:
      - "6389:6379"
    command: valkey-server --maxmemory 512mb --maxmemory-policy noeviction --appendonly yes
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1g"

  migrate:
    build: .
    restart: "no"
    environment:
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-django-insecure-api-bank-dev-key}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      DATABASE_URL: postgresql://${PG_DB_USERNAME:-postgres}:${PG_DB_PASSWORD:-password}@postgres:5432/${PG_DB_NAME:-api_bank}
      REDIS_URL: redis://valkey:6379/0
      CELERY_BROKER_URL: redis://valkey:6379/0
      CELERY_RESULT_BACKEND: redis://valkey:6379/0
    command:
      - "sh"
      - "-c"
      - |
        max_retries=30
        attempt=1
        until python manage.py migrate --noinput --fake-initial; do
          if [ "$$attempt" -ge "$$max_retries" ]; then
            echo "Migration failed after $$max_retries attempts"
            exit 1
          fi
          echo "Retry migrate in 2s... ($$attempt/$$max_retries)"
          attempt=$$((attempt+1))
          sleep 2
        done
    depends_on:
      - postgres

  app:
    build: .
    restart: always
    deploy:
      mode: replicated
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: "1g"
    environment:
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-django-insecure-api-bank-dev-key}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      DATABASE_URL: postgresql://${PG_DB_USERNAME:-postgres}:${PG_DB_PASSWORD:-password}@pgbouncer:5432/${PG_DB_NAME:-api_bank}
      REDIS_URL: redis://valkey:6379/0
      CELERY_BROKER_URL: redis://valkey:6379/0
      CELERY_RESULT_BACKEND: redis://valkey:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_started
      pgbouncer:
        condition: service_started

  worker:
    build: .
    restart: always
    command: celery -A config worker --loglevel=info
    environment:
      DEBUG: "True"
      SECRET_KEY: ${SECRET_KEY:-django-insecure-api-bank-dev-key}
      DATABASE_URL: postgresql://${PG_DB_USERNAME:-postgres}:${PG_DB_PASSWORD:-password}@pgbouncer:5432/${PG_DB_NAME:-api_bank}
      REDIS_URL: redis://valkey:6379/0
      CELERY_BROKER_URL: redis://valkey:6379/0
      CELERY_RESULT_BACKEND: redis://valkey:6379/0
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_started
      pgbouncer:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

volumes:
  postgres_data: