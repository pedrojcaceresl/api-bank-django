services:
  db:
    image: postgres:15-alpine
    container_name: bank-db
    environment:
      POSTGRES_DB: api_bank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bank-redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: bank-web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-api-bank-dev-key
      - DATABASE_URL=postgres://postgres:password@db:5432/api_bank
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=*
    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: bank-worker
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
      - /app/.venv
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-api-bank-dev-key
      - DATABASE_URL=postgres://postgres:password@db:5432/api_bank
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data: